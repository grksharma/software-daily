<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#06080c" />

    <title>Software Daily — your daily developer signal</title>
    <meta
      name="description"
      content="The sharpest software writing, thoughtfully curated into one calm daily read. A hand-picked digest of engineering, AI, and infrastructure stories."
    />
    <!--
      TODO: once the production domain is known, add the absolute canonical and
      og:url here, e.g.
        <link rel="canonical" href="https://your-domain.com/" />
        <meta property="og:url" content="https://your-domain.com/" />
      Both are omitted rather than guessed: a canonical pointing at the wrong
      host is worse for SEO than none at all. Add an og:image (1200x630) too so
      shared links render a card instead of bare text.
    -->

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Software Daily" />
    <meta property="og:title" content="Software Daily — your daily developer signal" />
    <meta
      property="og:description"
      content="The sharpest software writing, thoughtfully curated into one calm daily read."
    />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Software Daily — your daily developer signal" />
    <meta
      name="twitter:description"
      content="The sharpest software writing, thoughtfully curated into one calm daily read."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
