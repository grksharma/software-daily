<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Software Daily — your daily developer signal">
  <!--
    Social share card (Open Graph / Twitter), 1200x630.

    Source artwork. Most scrapers (X, Facebook, LinkedIn) reject SVG og:images,
    so export this to public/og-image.png before wiring the meta tags — e.g.
      rsvg-convert -w 1200 -h 630 og-image.svg > og-image.png
    then add, once the production domain is known:
      <meta property="og:image" content="https://your-domain.com/og-image.png" />
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080b11"/>
      <stop offset="1" stop-color="#06080c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.28" r="0.5">
      <stop offset="0" stop-color="#00ccff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#00ccff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Orbit motif, echoing the site hero -->
  <g fill="none" stroke-width="1.5">
    <circle cx="960" cy="300" r="250" stroke="#00ccff" stroke-opacity="0.14"/>
    <circle cx="960" cy="300" r="165" stroke="#a855f7" stroke-opacity="0.18"/>
  </g>
  <circle cx="960" cy="135" r="6" fill="#00ccff"/>
  <circle cx="1140" cy="330" r="5" fill="#a855f7"/>

  <!-- Brand lockup -->
  <g transform="translate(80, 74)">
    <rect width="46" height="46" rx="11" fill="#00ccff"/>
    <text x="23" y="33" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="27" font-weight="800" letter-spacing="-3" fill="#071017">S/</text>
    <text x="62" y="32" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="26" font-weight="800" letter-spacing="-0.5" fill="#f8fafc">software<tspan fill="#00ccff">daily</tspan></text>
  </g>

  <!-- Eyebrow -->
  <text x="82" y="250" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="3" fill="#00ccff">YOUR DAILY SIGNAL</text>

  <!-- Headline -->
  <text x="80" y="336" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="82" font-weight="800" letter-spacing="-3" fill="#f8fafc">Keep up without</text>
  <text x="80" y="428" font-family="Georgia, 'Times New Roman', serif" font-size="82" font-style="italic" fill="#00ccff">keeping up.</text>

  <!-- Tagline -->
  <text x="82" y="500" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="27" fill="#94a3b8">The sharpest software writing, curated into one calm daily read.</text>

  <!-- Footer meta -->
  <text x="82" y="566" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="19" font-weight="600" letter-spacing="0.5" fill="#64748b">Engineering blogs, distilled into quick bytes and simplified reads.</text>
</svg>
