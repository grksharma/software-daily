name: Daily digest

# Ingests new stories from the configured feeds and commits them to main.
#
# This publishes automatically, so the job is deliberately fail-closed: the
# guardrail tests and a production build must both pass before anything is
# committed. If either fails, the run stops and the site keeps serving the
# last known-good digest.

on:
  schedule:
    # 06:17 UTC daily. Off the hour on purpose — :00 is the busiest slot on
    # GitHub's shared scheduler and queued runs are frequently delayed there.
    - cron: '17 6 * * *'
  workflow_dispatch: # allow a manual run from the Actions tab

# Least privilege: the job needs to push a commit and nothing else.
permissions:
  contents: write

# Never let two runs race on the same file.
concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Verify ingest guardrails
        # These assert that a hostile feed cannot inject a foreign URL, control
        # characters, or markup. Run before the fetch, not after.
        run: npm test

      - name: Fetch new stories
        run: npm run digest

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- src/data/stories.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No new stories today."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat -- src/data/stories.json
          fi

      - name: Verify the site still builds
        # A malformed entry must never reach production. If the build breaks,
        # the job fails here and nothing is committed.
        if: steps.diff.outputs.changed == 'true'
        run: npm run lint && npm run build

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/stories.json
          git commit -m "Add today's digest stories

          Automated by .github/workflows/daily-digest.yml"
          git push
